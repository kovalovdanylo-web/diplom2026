<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Вхід — Receipt Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="mark">🧾</div>
      <div class="name">Receipt Tracker</div>
    </div>

    <div class="auth-title">Вхід в акаунт</div>
    <div class="auth-sub">Введіть email та пароль щоб продовжити</div>

    {% if error %}
    <div class="auth-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" name="email"
               placeholder="you@example.com" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Пароль</label>
        <input class="form-input" type="password" name="password"
               placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-auth">Увійти</button>
    </form>

    <div class="auth-switch">
      Немає акаунту?
      <a href="{{ url_for('register') }}">Зареєструватись</a>
    </div>
  </div>
</div>
</body>
</html>
