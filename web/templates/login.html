<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Вхід — Receipt Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="mark">🧾</div>
      <div class="name">Receipt Tracker</div>
    </div>

    <div class="auth-title">Вхід в акаунт</div>
    <div class="auth-sub">Введіть email та пароль щоб продовжити</div>

    {% if error %}
    <div class="auth-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" name="email"
               placeholder="you@example.com" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Пароль</label>
        <div class="input-wrap">
          <input class="form-input" type="password" name="password"
                 id="loginPwd" placeholder="••••••••" required>
          <button type="button" class="eye-btn" onclick="toggleEye('loginPwd', this)" tabindex="-1">
            <svg id="loginPwd-eye" width="16" height="16" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn-auth">Увійти</button>
    </form>

    <div class="auth-switch">
      Немає акаунту?
      <a href="{{ url_for('register') }}">Зареєструватись</a>
    </div>
  </div>
</div>

<script>
function toggleEye(inputId, btn) {
  const input = document.getElementById(inputId);
  const svg   = document.getElementById(inputId + '-eye');
  const show  = input.type === 'password';
  input.type  = show ? 'text' : 'password';
  svg.innerHTML = show
    ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
       <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
       <line x1="1" y1="1" x2="23" y2="23"/>`
    : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
}
</script>
</body>
</html>
